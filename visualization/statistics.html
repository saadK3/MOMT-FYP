<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistics - MultiVehicle Playground</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-brand">MultiVehicle Playground</div>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="showcase.html" class="nav-link">Showcase</a>
          <a href="statistics.html" class="nav-link active">Statistics</a>
        </div>
      </div>
    </nav>

    <!-- Statistics Page -->
    <div class="stats-page">
      <!-- Search Section -->
      <div class="controls-panel" style="max-width: 1400px; margin: 2rem auto">
        <div class="control-group">
          <label class="control-label">Select Vehicle</label>
          <div style="display: flex; gap: 0.5rem">
            <input
              type="text"
              id="statsSearchGlobalId"
              class="control-input"
              placeholder="Enter Global ID"
            />
            <button
              id="statsSearchBtn"
              class="btn btn-primary"
              style="padding: 0.75rem 1.5rem"
            >
              Load Statistics
            </button>
          </div>
        </div>
      </div>

      <!-- Vehicle Info Card -->
      <div
        id="vehicleInfo"
        class="stats-card"
        style="
          max-width: 1400px;
          margin: 0 auto 2rem;
          padding: 2rem;
          display: none;
        "
      >
        <h2 class="stats-card-title">Vehicle Information</h2>
        <div
          style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
          "
        >
          <div>
            <div class="stat-label">Global ID</div>
            <div class="stat-number" style="font-size: 2rem" id="infoGlobalId">
              -
            </div>
          </div>
          <div>
            <div class="stat-label">Vehicle Class</div>
            <div class="stat-number" style="font-size: 2rem" id="infoClass">
              -
            </div>
          </div>
          <div>
            <div class="stat-label">Cameras</div>
            <div class="stat-number" style="font-size: 2rem" id="infoCameras">
              -
            </div>
          </div>
          <div>
            <div class="stat-label">Detections</div>
            <div
              class="stat-number"
              style="font-size: 2rem"
              id="infoDetections"
            >
              -
            </div>
          </div>
        </div>
      </div>

      <!-- Statistics Grid -->
      <div class="stats-grid">
        <!-- Camera Coverage Chart -->
        <div class="stats-card">
          <h3 class="stats-card-title">Camera Coverage</h3>
          <div id="cameraCoverageChart"></div>
        </div>

        <!-- Temporal Distribution -->
        <div class="stats-card">
          <h3 class="stats-card-title">Temporal Distribution</h3>
          <div id="temporalChart"></div>
        </div>
      </div>

      <!-- Camera Frames Grid -->
      <div class="stats-card" style="max-width: 1400px; margin: 2rem auto">
        <h3 class="stats-card-title">Camera Views</h3>
        <div id="cameraFrames" class="camera-grid">
          <div class="loading">Select a vehicle to view camera frames</div>
        </div>
      </div>
    </div>

    <script src="statistics.js"></script>
  </body>
</html>
