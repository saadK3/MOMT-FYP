<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showcase - MultiVehicle Playground</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-brand">MultiVehicle Playground</div>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="showcase.html" class="nav-link active">Showcase</a>
          <a href="statistics.html" class="nav-link">Statistics</a>
        </div>
      </div>
    </nav>

    <!-- Showcase Container -->
    <div class="showcase-container">
      <!-- Controls Panel -->
      <div class="controls-panel">
        <div
          style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem"
        >
          <div class="control-group">
            <label class="control-label">Search Global ID</label>
            <div style="display: flex; gap: 0.5rem">
              <input
                type="text"
                id="searchGlobalId"
                class="control-input"
                placeholder="Enter Global ID"
              />
              <button
                id="searchBtn"
                class="btn btn-primary"
                style="padding: 0.75rem 1.5rem"
              >
                Search
              </button>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label">Playback Speed</label>
            <select id="speedSelect" class="control-input">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="5">5x</option>
              <option value="10">10x</option>
            </select>
          </div>

          <div class="control-group">
            <label class="control-label">Showcase Mode</label>
            <button
              id="showcaseBtn"
              class="btn btn-secondary"
              style="width: 100%; padding: 0.75rem"
            >
              Start Showcase
            </button>
          </div>
        </div>

        <div class="control-group" style="margin-top: 1.5rem">
          <label class="control-label"
            >Timeline: <span id="currentTime">0.0s</span></label
          >
          <input
            type="range"
            id="timeSlider"
            class="control-input"
            style="width: 100%"
          />
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem">
          <button id="playPauseBtn" class="btn btn-primary">Play</button>
          <button id="resetBtn" class="btn btn-secondary">Reset</button>
        </div>

        <div
          id="showcaseInfo"
          style="
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 10px;
          "
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <span
              >Showcase: <span id="showcaseIndex">1</span> of
              <span id="showcaseTotal">0</span></span
            >
            <div style="display: flex; gap: 0.5rem">
              <button
                id="nextExampleBtn"
                class="btn btn-primary"
                style="padding: 0.5rem 1rem"
              >
                Next
              </button>
              <button
                id="exitShowcaseBtn"
                class="btn btn-secondary"
                style="padding: 0.5rem 1rem"
              >
                Exit
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Visualization Panel -->
      <div class="visualization-panel">
        <div id="groundPlane" style="height: 700px; min-height: 700px"></div>
      </div>
    </div>

    <script src="visualization.js"></script>
  </body>
</html>
