<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOMT Unity 3D Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/unity-host/host.css" />
  </head>
  <body>
    <div id="unityShell">
      <div id="unityStage">
        <canvas id="unityCanvas"></canvas>
      </div>
      <div id="unityOverlay">
        <div id="unityStatusCard">
          <div class="overlay-title">Unity 3D</div>
          <div class="overlay-copy" id="unityStatusText">
            Loading Unity WebGL build...
          </div>
        </div>
        <div id="unityHoverCard" class="hidden">
          <div class="overlay-title" id="hoverTitle">Vehicle</div>
          <div class="overlay-copy" id="hoverCopy"></div>
        </div>
        <div id="unityLegendCard">
          <div class="overlay-title">3D Legend</div>
          <div class="overlay-copy legend-copy">
            <span class="legend-item"><span class="legend-swatch sedan"></span>Sedan</span>
            <span class="legend-item"><span class="legend-swatch suvhatch"></span>SUV / Hatchback</span>
            <span class="legend-item"><span class="legend-swatch pickup"></span>Pickup / Minitruck</span>
            <span class="legend-item"><span class="legend-swatch semi"></span>Truck / Semi-Truck</span>
            <span class="legend-item"><span class="legend-swatch van"></span>Van</span>
            <span class="legend-item"><span class="legend-swatch bus"></span>Bus</span>
            <span class="legend-item"><span class="legend-swatch bike"></span>Bike / Motorcycle</span>
            <span class="legend-item"><span class="legend-swatch other"></span>Other / Negative</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/unity-host/host.js"></script>
  </body>
</html>
